<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RICOCHET LIVE ADVANCED • BO7 / Warzone</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .live-dot { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .flash { animation: flash 0.6s ease-in-out 3; }
    @keyframes flash { 0%, 100% { background-color: #00ff9d; } 50% { background-color: transparent; } }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-5xl mx-auto p-6">
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-[#00ff9d] rounded-2xl flex items-center justify-center text-black font-bold text-3xl rotate-12">R</div>
        <div>
          <h1 class="text-5xl font-bold tracking-tighter">RICOCHET LIVE</h1>
          <p class="text-[#00ff9d] text-sm -mt-1">ADVANCED • SEASON 03 MONITOR</p>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-2">
          <div class="w-3 h-3 bg-green-400 rounded-full live-dot"></div>
          <span id="status" class="font-medium text-green-400">MONITORING LIVE</span>
        </div>
        <button onclick="toggleSound()" id="soundBtn"
          class="px-4 py-1.5 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-xs font-medium flex items-center gap-1 transition">
          🔊
        </button>
      </div>
    </div>

    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-8 shadow-2xl">
      <!-- Latest -->
      <div class="mb-8">
        <div class="flex justify-between items-baseline mb-4">
          <h2 class="text-2xl font-bold flex items-center gap-2"><span class="text-[#00ff9d]">●</span> LATEST SECURITY UPDATE</h2>
          <span id="last-checked" class="text-xs text-zinc-400">Waiting for first check...</span>
        </div>
        <div id="patch-card" class="bg-zinc-800 border border-zinc-700 rounded-3xl p-7 transition-all">
          <p id="no-patch" class="text-zinc-400 italic">No new RICOCHET / security updates yet...</p>
          <div id="patch-content" class="hidden">
            <a id="patch-title-link" href="#" target="_blank" class="block text-3xl font-bold hover:text-[#00ff9d] transition-colors"></a>
            <p id="patch-date" class="text-sm text-zinc-400 mt-2"></p>
            <p id="patch-excerpt" class="mt-4 text-zinc-300"></p>
          </div>
        </div>
      </div>

      <!-- History -->
      <div class="mb-8">
        <div class="flex justify-between items-center mb-4">
          <h3 class="uppercase text-xs tracking-widest text-zinc-500">Detection History</h3>
          <button onclick="clearHistory()" class="text-xs text-red-400 hover:text-red-300">Clear All</button>
        </div>
        <ul id="history-list" class="space-y-3 max-h-80 overflow-auto"></ul>
      </div>

      <!-- Live Log -->
      <div>
        <h3 class="uppercase text-xs tracking-widest text-zinc-500 mb-3">Live Check Log</h3>
        <div id="check-log" class="bg-black/50 border border-zinc-700 rounded-2xl p-4 font-mono text-xs text-zinc-400 h-52 overflow-y-auto"></div>
      </div>
    </div>

    <div class="text-center text-[10px] text-zinc-500 mt-8 flex items-center justify-center gap-6">
      <p>Polls every 30 seconds • Both Blog + Patch Notes</p>
      <button onclick="manualCheck()" class="px-5 py-2 bg-[#00ff9d] hover:bg-emerald-400 text-black font-semibold rounded-2xl text-sm transition">CHECK NOW</button>
    </div>
  </div>

  <script>
    const PROXIES = [
      'https://corsproxy.io/?',
      'https://proxy.corsfix.com/?',
      'https://api.codetabs.com/v1/proxy?quest=',
      'https://cors-anywhere.herokuapp.com/' // extra fallback (sometimes works)
    ];
    const SOURCES = [
      { name: 'Blog', url: 'https://www.callofduty.com/blog' },
      { name: 'Patch Notes', url: 'https://www.callofduty.com/patchnotes' }
    ];
    const KEYWORDS = ['ricochet', 'anti-cheat', 'anti cheat', 'security', 'progress report'];

    let lastSeenTitle = localStorage.getItem('lastSeenPatch') || '';
    let history = JSON.parse(localStorage.getItem('patchHistory')) || [];
    let soundEnabled = true;
    let checkCount = 0;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playAlertSound() {
      if (!soundEnabled) return;
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
      gainNode.gain.value = 0.4;
      oscillator.start();
      setTimeout(() => { oscillator.stop(); }, 180);
      setTimeout(() => {
        const o2 = audioCtx.createOscillator();
        o2.frequency.setValueAtTime(1200, audioCtx.currentTime);
        o2.connect(gainNode);
        gainNode.gain.value = 0.3;
        o2.start();
        setTimeout(() => o2.stop(), 120);
      }, 200);
    }

    function addToLog(message) {
      const log = document.getElementById('check-log');
      const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
      const entry = document.createElement('div');
      entry.textContent = `[${time}] ${message}`;
      log.prepend(entry);
      if (log.children.length > 12) log.lastChild.remove();
    }

    function renderHistory() {
      const list = document.getElementById('history-list');
      list.innerHTML = history.map(item => `
        <li class="flex justify-between items-center bg-zinc-900 border border-zinc-800 px-5 py-4 rounded-3xl">
          <a href="${item.link}" target="_blank" class="font-medium hover:text-[#00ff9d]">${item.title}</a>
          <span class="text-xs text-zinc-500">${item.source} • ${item.date}</span>
        </li>
      `).join('');
    }

    async function fetchWithProxy(url) {
      for (const proxy of PROXIES) {
        try {
          const res = await fetch(proxy + encodeURIComponent(url), { headers: { 'Accept': 'text/html' } });
          if (res.ok) return await res.text();
        } catch (e) {}
      }
      throw new Error('Proxy failed');
    }

    async function checkSource(source) {
      const html = await fetchWithProxy(source.url);
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');

      const links = Array.from(doc.querySelectorAll('a[href^="/blog/"], a[href^="/patchnotes/"], a[href*="/blog/"], a[href*="/patchnotes/"]'));
      let match = null;

      for (const link of links) {
        const title = (link.textContent || '').trim();
        if (!title) continue;
        const lower = title.toLowerCase();
        if (KEYWORDS.some(kw => lower.includes(kw))) {
          match = {
            title: title,
            link: 'https://www.callofduty.com' + (link.getAttribute('href') || ''),
            date: 'Detected live',
            excerpt: `${source.name} — RICOCHET / security update`,
            source: source.name
          };
          break;
        }
      }
      return match;
    }

    async function checkForPatches() {
      const statusEl = document.getElementById('status');
      statusEl.textContent = 'CHECKING...';
      statusEl.classList.add('text-amber-400');
      statusEl.classList.remove('text-green-400', 'text-red-400');

      checkCount++;
      addToLog(`Check #${checkCount} started`);

      let newPatch = null;

      for (const source of SOURCES) {
        try {
          const result = await checkSource(source);
          if (result && result.title !== lastSeenTitle) {
            newPatch = result;
            break;
          }
        } catch (e) {
          addToLog(`❌ ${source.name} failed`);
        }
      }

      const now = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      document.getElementById('last-checked').innerHTML = `Last checked <span class="font-mono">${now}</span>`;

      if (newPatch) {
        lastSeenTitle = newPatch.title;
        localStorage.setItem('lastSeenPatch', lastSeenTitle);

        // Update main card
        document.getElementById('no-patch').classList.add('hidden');
        const content = document.getElementById('patch-content');
        content.classList.remove('hidden');
        document.getElementById('patch-title-link').textContent = newPatch.title;
        document.getElementById('patch-title-link').href = newPatch.link;
        document.getElementById('patch-date').textContent = newPatch.date;
        document.getElementById('patch-excerpt').textContent = newPatch.excerpt;

        // History
        history.unshift(newPatch);
        if (history.length > 8) history.pop();
        localStorage.setItem('patchHistory', JSON.stringify(history));
        renderHistory();

        // Alerts
        playAlertSound();
        if ("Notification" in window && Notification.permission === "granted") {
          new Notification("🟢 RICOCHET UPDATE DETECTED!", {
            body: newPatch.title,
            icon: "https://www.callofduty.com/favicon.ico"
          });
        }

        // Flash animation
        const card = document.getElementById('patch-card');
        card.classList.add('flash');
        setTimeout(() => card.classList.remove('flash'), 2000);

        addToLog(`✅ NEW PATCH FOUND: ${newPatch.source}`);
      } else {
        addToLog('No new security updates');
      }

      statusEl.textContent = 'MONITORING LIVE';
      statusEl.classList.add('text-green-400');
    }

    function manualCheck() {
      checkForPatches();
    }

    function toggleSound() {
      soundEnabled = !soundEnabled;
      document.getElementById('soundBtn').textContent = soundEnabled ? '🔊' : '🔇';
    }

    function clearHistory() {
      if (confirm('Clear all detection history?')) {
        history = [];
        localStorage.setItem('patchHistory', JSON.stringify(history));
        renderHistory();
      }
    }

    // Init
    window.onload = () => {
      renderHistory();
      checkForPatches(); // first check

      // Auto request notifications
      if ("Notification" in window && Notification.permission === "default") {
        Notification.requestPermission();
      }

      setInterval(checkForPatches, 30000); // every 30 seconds

      console.log('%c🚀 RICOCHET LIVE ADVANCED MONITOR STARTED — Dual sources + sound alerts', 'color:#00ff9d; font-size:14px; font-weight:bold');
    };
  </script>
</body>
</html>
