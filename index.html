<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Ro Scooter Dasher App</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
body {
	font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
	margin: 0;
	padding: 15px;
	background-color: #f4f4f9;
	color: #333;
}

h2 {
	text-align: center;
	color: #ff3366; /* DoorDash red-ish */
	margin-top: 0;
}

.dashboard {
	background: white;
	padding: 20px;
	border-radius: 12px;
	box-shadow: 0 4px 6px rgba(0,0,0,0.1);
	margin-bottom: 20px;
}

.input-group {
	margin-bottom: 15px;
}

label {
	display: block;
	font-weight: bold;
	margin-bottom: 5px;
}

input {
	width: 100%;
	padding: 10px;
	border: 1px solid #ccc;
	border-radius: 6px;
	box-sizing: border-box; /* Ensures padding doesn't affect 100% width */
	font-size: 16px;
}

button {
	width: 100%;
	padding: 12px;
	background-color: #ff3366;
	color: white;
	border: none;
	border-radius: 6px;
	font-size: 18px;
	font-weight: bold;
	cursor: pointer;
	margin-top: 10px;
}

button:active {
	background-color: #e62e5c;
}

/* The Map Container */
#map {
height: 400px;
width: 100%;
border-radius: 12px;
box-shadow: 0 4px 6px rgba(0,0,0,0.1);
z-index: 1; /* Keeps it behind dropdowns if added later */
}

/* The Warning Banner */
#warning-banner {
display: none; /* Hidden by default */
background-color: #fff3cd;
color: #856404;
padding: 15px;
border-left: 6px solid #ffeeba;
border-radius: 6px;
margin-top: 15px;
font-weight: bold;
font-size: 14px;
}
</style>
</head>
<body>

<h2>Scooter Range & Routing</h2>

<div class="dashboard">
<div class="input-group">
<label for="maxRange">Scooter Max Range (Miles)</label>
<input type="number" id="maxRange" placeholder="e.g., 30" value="30">
</div>

<div class="input-group">
<label for="batteryPct">Current Battery (%)</label>
<input type="number" id="batteryPct" placeholder="e.g., 50" value="50">
</div>

<div class="input-group">
<label for="routeElevation">Route Elevation Gain (Feet)</label>
<input type="number" id="routeElevation" placeholder="e.g., 80" value="80">
</div>

<button onclick="calculateAndDraw()">Calculate Safe Radius</button>

<div id="warning-banner"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// 1. Initialize the Map centered on downtown New Rochelle
const newRoLocation = [40.9115, -73.7824];
const map = L.map('map').setView(newRoLocation, 12);

// 2. Add the free OpenStreetMap tiles (the visual map layer)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
	maxZoom: 19,
	attribution: '© OpenStreetMap'
}).addTo(map);

// 3. Put a marker where the Dasher is
L.marker(newRoLocation).addTo(map)
.bindPopup("<b>You are here</b><br>New Rochelle Station").openPopup();

// Variable to store the circle so we can delete the old one when recalculating
let currentCircle = null;

// 4. The Core Logic Function
function calculateAndDraw() {
	// Get inputs from the HTML form
	const maxRange = parseFloat(document.getElementById('maxRange').value);
	const batteryPct = parseFloat(document.getElementById('batteryPct').value);
	const elevationGain = parseFloat(document.getElementById('routeElevation').value);
	
	// Handle Topography Warning
	const warningBanner = document.getElementById('warning-banner');
	if (elevationGain > 150) {
		warningBanner.innerHTML = "⚠️ Warning: Steep inclines ahead! Expect faster battery drain. Consider lowering your safe radius.";
		warningBanner.style.display = "block";
	} else {
		warningBanner.style.display = "none";
	}
	
	// Handle the Math
	// Calculate remaining range based on battery %
	const remainingRangeMiles = maxRange * (batteryPct / 100);
	
	// Safe radius is half the remaining range (need to get back!)
	const safeRadiusMiles = remainingRangeMiles / 2;
	
	// Convert miles to meters for Leaflet
	const safeRadiusMeters = safeRadiusMiles * 1609.34;
	
	// Remove the old circle if it exists
	if (currentCircle) {
		map.removeLayer(currentCircle);
	}
	
	// Draw the new circle
	currentCircle = L.circle(newRoLocation, {
		color: '#28a745', // Green border
		fillColor: '#28a745', // Green fill
		fillOpacity: 0.2, // Make it see-through
		radius: safeRadiusMeters
	}).addTo(map);
	
	// Auto-zoom the map so the whole circle fits on the screen
	map.fitBounds(currentCircle.getBounds());
}

// Run the calculation once automatically when the page loads
window.onload = calculateAndDraw;
</script>
</body>
</html>
