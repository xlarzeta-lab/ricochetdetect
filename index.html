<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>New Ro Dash</title>
    
    <link rel="manifest" href='data:application/manifest+json,{"name":"New Ro Scooter Dasher","short_name":"NewRo Dash","display":"standalone","background_color":"#000000","theme_color":"#ff3366"}'>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NewRo Dash">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            --bg-deep: #000000;
            --glass-bg: rgba(18, 18, 18, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            
            --accent-start: #ff2a6d;
            --accent-end: #ff5f6d;
            --xmr-orange: #F26822; /* Monero Brand Orange */
            
            --dye-warn: #ffd700;
            --dye-rain: #3399ff;
            --dye-physics: #00e5ff; 
            
            --text-main: #ffffff;
            --text-muted: #888888;
            
            --bento-gap: 12px;
            --panel-padding: 24px;
        }

        body, html {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            background-color: var(--bg-deep);
            overflow: hidden;
            padding-bottom: env(safe-area-inset-bottom);
            box-sizing: border-box;
            color: var(--text-main);
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .top-bar {
            position: absolute;
            top: calc(10px + env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 8px 18px;
            border-radius: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            pointer-events: none;
        }

        .top-bar h2 {
            margin: 0;
            font-size: 16px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .dashboard {
            position: absolute;
            bottom: calc(15px + env(safe-area-inset-bottom));
            left: 15px;
            right: 15px;
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--glass-border);
            padding: var(--panel-padding);
            border-radius: 32px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--bento-gap);
        }

        .status-grid {
            display: flex;
            flex-wrap: wrap;
            gap: var(--bento-gap);
        }

        .status-cell {
            display: none; 
            flex: 1 1 calc(50% - var(--bento-gap)); 
            background: rgba(0,0,0,0.4);
            border: 1px solid transparent;
            border-radius: 16px;
            padding: 12px;
            font-size: 12px;
            font-weight: 700;
            text-align: center;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        #weather-banner {
            display: block; 
            color: var(--text-muted); 
            border-color: rgba(255, 255, 255, 0.05);
        }

        #weather-banner.active {
            border-color: rgba(51, 153, 255, 0.3);
            color: var(--dye-rain);
            background: rgba(51, 153, 255, 0.1);
            box-shadow: 0 0 12px rgba(51, 153, 255, 0.1);
        }

        #warning-banner.active {
            display: block;
            border-color: rgba(255, 171, 0, 0.3);
            color: var(--dye-warn);
            background: rgba(255, 171, 0, 0.1);
            box-shadow: 0 0 12px rgba(255, 171, 0, 0.1);
        }

        #physics-banner.active {
            display: block;
            border-color: rgba(0, 229, 255, 0.3);
            color: var(--dye-physics);
            background: rgba(0, 229, 255, 0.1);
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.1);
            flex-basis: 100%; 
        }

        /* Earnings Banner Dynamic Styles */
        #earnings-banner.active.good {
            display: block;
            border-color: rgba(50, 205, 50, 0.3);
            color: #32cd32;
            background: rgba(50, 205, 50, 0.1);
            box-shadow: 0 0 12px rgba(50, 205, 50, 0.1);
            flex-basis: 100%; 
        }

        #earnings-banner.active.bad {
            display: block;
            border-color: rgba(255, 77, 77, 0.3);
            color: #ff4d4d;
            background: rgba(255, 77, 77, 0.1);
            box-shadow: 0 0 12px rgba(255, 77, 77, 0.1);
            flex-basis: 100%; 
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--bento-gap);
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--bento-gap);
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 800;
            padding-left: 2px;
        }

        input {
            width: 100%;
            padding: 16px;
            background-color: rgba(0,0,0,0.5);
            border: 1px solid transparent;
            color: var(--text-main);
            border-radius: 14px;
            box-sizing: border-box;
            font-size: 16px;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus {
            outline: none;
            border-color: rgba(255, 42, 109, 0.3);
            box-shadow: 0 0 15px rgba(255, 42, 109, 0.15);
            background-color: rgba(0,0,0,0.7);
        }

        /* GPS Button */
        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 6px 20px rgba(255, 42, 109, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:active {
            transform: scale(0.96) translateY(2px);
            box-shadow: 0 3px 10px rgba(255, 42, 109, 0.2);
        }

        /* Monero Donation Footer */
        .xmr-footer {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            padding: 10px 14px;
            border: 1px solid rgba(242, 104, 34, 0.15);
        }

        .xmr-label {
            color: var(--xmr-orange);
            font-size: 11px;
            font-weight: 800;
            margin-right: 12px;
            letter-spacing: 1px;
        }

        .xmr-input {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 11px;
            width: 100%;
            padding: 0;
            outline: none;
            cursor: pointer;
            text-overflow: ellipsis;
        }

        .xmr-input:focus {
            box-shadow: none;
            background: transparent;
        }

        .leaflet-container {
            background-color: var(--bg-deep) !important;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="top-bar">
        <h2>NewRo Dash</h2>
    </div>

    <div class="dashboard">
        
        <div class="status-grid">
            <div id="weather-banner" class="status-cell">🌥️ Loading Weather...</div>
            <div id="warning-banner" class="status-cell"></div>
            <div id="physics-banner" class="status-cell"></div>
            <div id="earnings-banner" class="status-cell"></div>
        </div>
        
        <div class="input-grid">
            <div class="input-row">
                <div class="input-group">
                    <label for="orderPay">Order Pay ($)</label>
                    <input type="number" id="orderPay" placeholder="0.00" step="0.50" oninput="calculateAndDraw()">
                </div>

                <div class="input-group">
                    <label for="orderDist">Distance (mi)</label>
                    <input type="number" id="orderDist" placeholder="0.0" step="0.1" oninput="calculateAndDraw()">
                </div>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="maxRange">Max Range (mi)</label>
                    <input type="number" id="maxRange" value="30" oninput="calculateAndDraw()">
                </div>

                <div class="input-group">
                    <label for="batteryPct">Battery (%)</label>
                    <input type="number" id="batteryPct" value="50" oninput="calculateAndDraw()">
                </div>
            </div>

            <div class="input-group" style="display: none;">
                <input type="number" id="routeElevation" value="80" oninput="calculateAndDraw()">
            </div>
        </div>

        <button id="gps-btn" onclick="startGPS()">📍 Enable Live Tracking</button>

        <div class="xmr-footer">
            <span class="xmr-label">DONATE</span>
            <input type="text" class="xmr-input" value="Your_XMR_Address_Here" readonly onclick="this.select();" title="Click to copy">
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Start at New Ro Station by default, but this will update with GPS
        let activeLocation = [40.9115, -73.7824]; 
        
        let liveTemp = null;
        let liveWind = null;
        let weatherLoaded = false;

        window.addEventListener('DOMContentLoaded', (event) => {
            const savedRange = localStorage.getItem('scooterMaxRange');
            if (savedRange) {
                document.getElementById('maxRange').value = savedRange;
            }
            checkWeather();
        });

        const map = L.map('map', { 
            zoomControl: false,
            attributionControl: false 
        }).setView(activeLocation, 13);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        const customMarker = L.circleMarker(activeLocation, {
            radius: 8,
            fillColor: "#ffffff",
            color: "#ff2a6d",
            weight: 3,
            opacity: 1,
            fillOpacity: 1
        }).addTo(map);

        let currentCircle = null;

        // GPS Tracking Logic
        function startGPS() {
            const btn = document.getElementById('gps-btn');
            
            if ("geolocation" in navigator) {
                btn.innerHTML = "Locating...";
                navigator.geolocation.watchPosition((position) => {
                    activeLocation = [position.coords.latitude, position.coords.longitude];
                    
                    // Update Marker & Map View
                    customMarker.setLatLng(activeLocation);
                    map.setView(activeLocation, 14);
                    
                    // Visually update button state
                    btn.innerHTML = "🟢 GPS Active";
                    btn.style.background = "linear-gradient(135deg, #32cd32, #28a745)";
                    btn.style.boxShadow = "0 6px 20px rgba(50, 205, 50, 0.3)";
                    
                    // Recalculate radius from new live location
                    calculateAndDraw();
                    
                }, (error) => {
                    btn.innerHTML = "⚠️ GPS Denied";
                    console.log("GPS Error:", error);
                }, {
                    enableHighAccuracy: true,
                    maximumAge: 10000,
                    timeout: 5000
                });
            } else {
                btn.innerHTML = "GPS Not Supported";
            }
        }

        async function checkWeather() {
            const weatherBanner = document.getElementById('weather-banner');
            try {
                const url = 'https://api.open-meteo.com/v1/forecast?latitude=40.9115&longitude=-73.7824&current=temperature_2m,wind_speed_10m&hourly=precipitation_probability&temperature_unit=fahrenheit&wind_speed_unit=mph&forecast_hours=5';
                const response = await fetch(url);
                const data = await response.json();
                
                liveTemp = data.current.temperature_2m;
                liveWind = data.current.wind_speed_10m;
                weatherLoaded = true;

                const rainProbabilities = data.hourly.precipitation_probability;
                const maxRainChance = Math.max(...rainProbabilities);

                if (maxRainChance > 30) {
                    weatherBanner.innerHTML = `🌧️ ${maxRainChance}% Rain Alert`;
                    weatherBanner.classList.add('active');
                } else {
                    weatherBanner.innerHTML = `🌥️ ${maxRainChance}% Rain Chance`;
                    weatherBanner.classList.remove('active');
                }

                calculateAndDraw();
            } catch (error) {
                weatherBanner.innerHTML = `⚠️ Weather Offline`;
                weatherBanner.classList.remove('active');
            }
        }

        // Master Calculation Function (Runs automatically on any input)
        function calculateAndDraw() {
            // 1. Get Values
            const maxRangeInput = document.getElementById('maxRange').value;
            const maxRange = parseFloat(maxRangeInput) || 0;
            const batteryPct = parseFloat(document.getElementById('batteryPct').value) || 0;
            const elevationGain = parseFloat(document.getElementById('routeElevation').value) || 0;
            
            const orderPay = parseFloat(document.getElementById('orderPay').value);
            const orderDist = parseFloat(document.getElementById('orderDist').value);

            localStorage.setItem('scooterMaxRange', maxRangeInput);

            // 2. Profitability Engine
            const earningsBanner = document.getElementById('earnings-banner');
            if (orderPay > 0 && orderDist > 0) {
                const perMile = (orderPay / orderDist).toFixed(2);
                if (perMile >= 2.00) {
                    earningsBanner.innerHTML = `💸 $${perMile}/mi (Profitable)`;
                    earningsBanner.className = 'status-cell active good';
                } else {
                    earningsBanner.innerHTML = `⚠️ $${perMile}/mi (Low Pay)`;
                    earningsBanner.className = 'status-cell active bad';
                }
            } else {
                earningsBanner.className = 'status-cell';
            }

            // 3. Topography Warning
            const warningBanner = document.getElementById('warning-banner');
            if (elevationGain > 150) {
                warningBanner.innerHTML = "⚠️ Steep Inclines!";
                warningBanner.classList.add('active');
            } else {
                warningBanner.classList.remove('active');
            }

            // 4. Advanced Physics Penalty
            let tempPenalty = 1.0;
            let windPenalty = 1.0;
            let penaltyReasons = [];

            if (weatherLoaded) {
                if (liveTemp <= 32) {
                    tempPenalty = 0.75; 
                    penaltyReasons.push(`Cold (${Math.round(liveTemp)}°F)`);
                } else if (liveTemp <= 45) {
                    tempPenalty = 0.85; 
                    penaltyReasons.push(`Chilly (${Math.round(liveTemp)}°F)`);
                }

                if (liveWind >= 20) {
                    windPenalty = 0.80; 
                    penaltyReasons.push(`Wind (${Math.round(liveWind)}mph)`);
                } else if (liveWind >= 12) {
                    windPenalty = 0.90; 
                    penaltyReasons.push(`Breezy (${Math.round(liveWind)}mph)`);
                }
            }

            const physicsBanner = document.getElementById('physics-banner');
            if (penaltyReasons.length > 0) {
                const totalPercentLost = Math.round((1 - (tempPenalty * windPenalty)) * 100);
                physicsBanner.innerHTML = `❄️ -${totalPercentLost}% Range: ${penaltyReasons.join(' & ')}`;
                physicsBanner.classList.add('active');
            } else {
                physicsBanner.classList.remove('active');
            }

            // 5. Draw Radius Mapping
            const baseRemainingMiles = maxRange * (batteryPct / 100);
            const actualRemainingMiles = baseRemainingMiles * tempPenalty * windPenalty;
            
            const safeRadiusMiles = actualRemainingMiles / 2;
            const safeRadiusMeters = safeRadiusMiles * 1609.34;

            if (currentCircle) {
                map.removeLayer(currentCircle);
            }

            // Circle drawn around the live activeLocation, not just New Ro Station
            currentCircle = L.circle(activeLocation, {
                color: '#ff2a6d', 
                weight: 3,
                fillColor: '#ff2a6d', 
                fillOpacity: 0.08,
                radius: safeRadiusMeters
            }).addTo(map);
        }

        // Run once on load
        window.onload = calculateAndDraw;
    </script>
</body>
</html>
