<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>New Ro Scooter Dasher App</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* CSS Variables for Dark Mode Palette */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #f5f5f5;
            --text-muted: #a0a0a0;
            --accent: #ff3366;
            --input-bg: #2c2c2c;
            --input-border: #444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            /* Flexbox makes the body take up the exact height of the phone screen */
            display: flex;
            flex-direction: column;
            height: 100vh; 
            overflow: hidden; /* Prevents bouncy page scrolling */
        }

        h2 {
            text-align: center;
            color: var(--accent);
            margin: 15px 0 10px 0;
            font-size: 22px;
            letter-spacing: 0.5px;
        }

        .dashboard {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            margin: 0 15px 15px 15px;
            display: flex;
            flex-direction: column;
            gap: 15px; /* Spaces out elements evenly */
        }

        /* Groups inputs side-by-side to save vertical space on small screens */
        .input-row {
            display: flex;
            gap: 15px; 
        }

        .input-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 14px; /* Larger tap target */
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-main);
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px; /* 16px prevents iOS from automatically zooming in */
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
        }

        button {
            width: 100%;
            padding: 16px; /* Massive, easy-to-hit button */
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }

        button:active {
            background-color: #e62e5c;
            transform: scale(0.98); /* Satisfying click animation */
        }

        /* Map takes up all remaining space at the bottom */
        #map {
            flex-grow: 1;
            width: 100%;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            z-index: 1;
        }

        #warning-banner {
            display: none;
            background-color: rgba(255, 193, 7, 0.1);
            color: #ffc107;
            padding: 12px;
            border: 1px solid rgba(255, 193, 7, 0.3);
            border-radius: 10px;
            font-weight: 500;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2>New Ro Dasher</h2>

    <div class="dashboard">
        <div class="input-row">
            <div class="input-group">
                <label for="maxRange">Max Range (mi)</label>
                <input type="number" id="maxRange" value="30">
            </div>

            <div class="input-group">
                <label for="batteryPct">Battery (%)</label>
                <input type="number" id="batteryPct" value="50">
            </div>
        </div>

        <div class="input-group">
            <label for="routeElevation">Elevation Gain (ft)</label>
            <input type="number" id="routeElevation" value="80">
        </div>

        <button onclick="calculateAndDraw()">Calculate Safe Radius</button>

        <div id="warning-banner"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const newRoLocation = [40.9115, -73.7824];
        
        // Removed zoom control for a cleaner mobile interface
        const map = L.map('map', {
            zoomControl: false 
        }).setView(newRoLocation, 12);

        // 🔥 THE MAGIC FIX FOR DARK MODE MAPS + LOCAL FILES 🔥
        // Using Carto's "Dark Matter" map tiles instead of OpenStreetMap
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map);

        L.marker(newRoLocation).addTo(map)
            .bindPopup("<b>You are here</b><br>New Rochelle Station").openPopup();

        let currentCircle = null;

        function calculateAndDraw() {
            const maxRange = parseFloat(document.getElementById('maxRange').value);
            const batteryPct = parseFloat(document.getElementById('batteryPct').value);
            const elevationGain = parseFloat(document.getElementById('routeElevation').value);

            const warningBanner = document.getElementById('warning-banner');
            if (elevationGain > 150) {
                warningBanner.innerHTML = "⚠️ Steep inclines! Expect faster battery drain.";
                warningBanner.style.display = "block";
            } else {
                warningBanner.style.display = "none";
            }

            const remainingRangeMiles = maxRange * (batteryPct / 100);
            const safeRadiusMiles = remainingRangeMiles / 2;
            const safeRadiusMeters = safeRadiusMiles * 1609.34;

            if (currentCircle) {
                map.removeLayer(currentCircle);
            }

            // Updated circle colors to pop against the dark map
            currentCircle = L.circle(newRoLocation, {
                color: '#ff3366', 
                weight: 2,
                fillColor: '#ff3366', 
                fillOpacity: 0.15,
                radius: safeRadiusMeters
            }).addTo(map);

            map.fitBounds(currentCircle.getBounds());
        }

        window.onload = calculateAndDraw;
    </script>
</body>
</html>
