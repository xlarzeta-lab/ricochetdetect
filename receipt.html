<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace Receipt Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
    /* Base Variables */
    :root {
        --bg-color: #f3f4f6;
        --form-bg: #ffffff;
        --text-main: #1f2937;
        --border-color: #e5e7eb;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --success: #10b981;
        --success-hover: #059669;
    }
    
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        min-height: 100vh;
    }
    
    .container {
        display: flex;
        gap: 40px;
        max-width: 1000px;
        width: 100%;
        flex-wrap: wrap;
        align-items: flex-start;
    }
    
    .form-section, .receipt-section {
        background: var(--form-bg);
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        flex: 1;
        min-width: 300px;
    }
    
    /* Form Styling */
    h2 {
        margin-top: 0;
        color: #111827;
        font-size: 1.5rem;
        margin-bottom: 20px;
    }
    
    .form-group {
        margin-bottom: 15px;
    }
    
    label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        margin-bottom: 5px;
        color: #4b5563;
    }
    
    input, select {
        width: 100%;
        padding: 10px;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        font-size: 1rem;
        box-sizing: border-box;
        transition: border-color 0.2s;
    }
    
    input:focus, select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    
    .btn-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 20px;
    }

    button {
        width: 100%;
        color: white;
        border: none;
        padding: 14px;
        font-size: 1rem;
        font-weight: 600;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.2s;
    }
    
    .btn-print {
        background-color: var(--accent);
    }
    .btn-print:hover {
        background-color: var(--accent-hover);
    }

    .btn-download {
        background-color: var(--success);
    }
    .btn-download:hover {
        background-color: var(--success-hover);
    }

    /* Receipt Styling (Thermal Printer Look) */
    .receipt-wrapper {
        display: flex;
        justify-content: center;
        background: #e5e7eb;
        padding: 20px;
        border-radius: 8px;
    }

    .receipt {
        font-family: 'Courier New', Courier, monospace;
        width: 100%;
        max-width: 320px;
        padding: 25px;
        border: 1px solid #ddd;
        background: #fff; /* Critical for clean image download */
        color: #000;
    }
    
    .receipt-header {
        text-align: center;
        margin-bottom: 20px;
        border-bottom: 2px dashed #000;
        padding-bottom: 15px;
    }
    
    .receipt-header h3 {
        margin: 0 0 5px 0;
        font-size: 1.3rem;
        text-transform: uppercase;
    }
    
    .receipt-header p {
        margin: 2px 0;
        font-size: 0.9rem;
    }
    
    .receipt-body {
        margin-bottom: 20px;
        border-bottom: 2px dashed #000;
        padding-bottom: 15px;
    }
    
    .receipt-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
        font-size: 0.95rem;
    }
    
    .item-block {
        margin-top: 15px;
        margin-bottom: 10px;
    }
    
    .item-desc {
        display: block;
        word-wrap: break-word;
        font-weight: bold;
        margin-bottom: 5px;
    }
    
    .receipt-total {
        font-weight: bold;
        font-size: 1.2rem;
        margin-top: 15px;
        border-top: 1px dashed #000;
        padding-top: 10px;
    }
    
    .receipt-footer {
        text-align: center;
        font-size: 0.85rem;
        margin-top: 20px;
    }

    /* Print Media Query - Hides form and isolates the receipt */
    @media print {
        body {
            background: white;
            padding: 0;
            display: block;
        }
        .form-section {
            display: none !important;
        }
        .receipt-section {
            box-shadow: none;
            border: none;
            padding: 0;
            margin: 0;
            width: 100%;
            max-width: none;
            display: flex;
            justify-content: center;
        }
        .receipt-wrapper {
            background: none;
            padding: 0;
        }
        .receipt {
            border: none;
            box-shadow: none;
        }
    }
</style>
</head>
<body>

<div class="container">
    <div class="form-section">
        <h2>Receipt Details</h2>
        
        <div class="form-group">
            <label for="sellerName">Seller Name</label>
            <input type="text" id="sellerName" placeholder="e.g., Jane Doe" oninput="updateReceipt()">
        </div>
        
        <div class="form-group">
            <label for="buyerName">Buyer Name</label>
            <input type="text" id="buyerName" placeholder="e.g., John Smith" oninput="updateReceipt()">
        </div>
        
        <div class="form-group">
            <label for="itemDesc">Item Description</label>
            <input type="text" id="itemDesc" placeholder="e.g., Used iPhone 13 Pro" oninput="updateReceipt()">
        </div>
        
        <div class="form-group">
            <label for="itemPrice">Price ($)</label>
            <input type="number" id="itemPrice" placeholder="0.00" step="0.01" oninput="updateReceipt()">
        </div>
        
        <div class="form-group">
            <label for="paymentMethod">Payment Method</label>
            <select id="paymentMethod" onchange="updateReceipt()">
                <option value="Cash">Cash</option>
                <option value="Venmo">Venmo</option>
                <option value="Zelle">Zelle</option>
                <option value="PayPal">PayPal</option>
                <option value="Cash App">Cash App</option>
                <option value="Facebook Pay">Facebook Pay</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="saleDate">Date of Sale</label>
            <input type="date" id="saleDate" oninput="updateReceipt()">
        </div>
        
        <div class="btn-group">
            <button onclick="downloadImage()" class="btn-download">📱 Download Image (Mobile)</button>
            <button onclick="window.print()" class="btn-print">🖨️ Print / Save as PDF (Desktop)</button>
        </div>
    </div>

    <div class="receipt-section">
        <h2>Preview</h2>
        <div class="receipt-wrapper">
            <div class="receipt" id="receipt">
                <div class="receipt-header">
                    <h3>Proof of Purchase</h3>
                    <p>Marketplace Sale</p>
                    <p id="r-date">Date: mm/dd/yyyy</p>
                </div>
                
                <div class="receipt-body">
                    <div class="receipt-row">
                        <span>Seller:</span>
                        <span id="r-seller" style="text-align: right; max-width: 60%; word-wrap: break-word;">N/A</span>
                    </div>
                    <div class="receipt-row">
                        <span>Buyer:</span>
                        <span id="r-buyer" style="text-align: right; max-width: 60%; word-wrap: break-word;">N/A</span>
                    </div>
                    
                    <div class="item-block">
                        <span>Item:</span>
                        <span class="item-desc" id="r-item">No item description</span>
                    </div>
                    
                    <div class="receipt-row receipt-total">
                        <span>TOTAL:</span>
                        <span id="r-price">$0.00</span>
                    </div>
                    
                    <div class="receipt-row" style="margin-top: 10px;">
                        <span>Payment via:</span>
                        <span id="r-method">Cash</span>
                    </div>
                </div>

                <div class="receipt-footer">
                    <p>Item sold "as is".<br>All sales are final.</p>
                    <p style="margin-top: 15px; font-weight: bold;">THANK YOU!</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Initialize the date to today upon loading
    window.onload = function() {
        const today = new Date();
        const yyyy = today.getFullYear();
        let mm = today.getMonth() + 1; 
        let dd = today.getDate();
        
        if (mm < 10) mm = '0' + mm;
        if (dd < 10) dd = '0' + dd;
        
        document.getElementById('saleDate').value = yyyy + '-' + mm + '-' + dd;
        updateReceipt();
    };

    function updateReceipt() {
        const seller = document.getElementById('sellerName').value || 'N/A';
        const buyer = document.getElementById('buyerName').value || 'N/A';
        const item = document.getElementById('itemDesc').value || 'No item description';
        const price = parseFloat(document.getElementById('itemPrice').value) || 0;
        const method = document.getElementById('paymentMethod').value;
        const dateInput = document.getElementById('saleDate').value;
        
        // Format the date to MM/DD/YYYY for the receipt
        let dateStr = 'mm/dd/yyyy';
        if (dateInput) {
            const [year, month, day] = dateInput.split('-');
            dateStr = `${month}/${day}/${year}`;
        }

        // Inject the values into the receipt layout
        document.getElementById('r-seller').innerText = seller;
        document.getElementById('r-buyer').innerText = buyer;
        document.getElementById('r-item').innerText = item;
        document.getElementById('r-price').innerText = '$' + price.toFixed(2);
        document.getElementById('r-method').innerText = method;
        document.getElementById('r-date').innerText = 'Date: ' + dateStr;
    }

    // Function to download the receipt as an image for mobile devices
    function downloadImage() {
        const receiptElement = document.getElementById('receipt');
        const originalButtonText = document.querySelector('.btn-download').innerText;
        
        // Temporarily change button text to show it's working
        document.querySelector('.btn-download').innerText = "Generating...";

        // Use html2canvas to take a snapshot of the receipt div
        html2canvas(receiptElement, {
            scale: 3, // Higher scale for crisp text on mobile retina screens
            backgroundColor: "#ffffff", // Ensure background is white
            useCORS: true 
        }).then(canvas => {
            // Convert canvas to image URL
            const imageURL = canvas.toDataURL("image/png");
            
            // Create a temporary link element to trigger the download
            const link = document.createElement('a');
            
            // Format filename with current date
            const dateStr = document.getElementById('saleDate').value;
            link.download = `Marketplace_Receipt_${dateStr}.png`;
            link.href = imageURL;
            
            // Click the link to download
            link.click();
            
            // Restore button text
            document.querySelector('.btn-download').innerText = originalButtonText;
        }).catch(err => {
            console.error("Error generating image: ", err);
            alert("Something went wrong generating the image. Please try again.");
            document.querySelector('.btn-download').innerText = originalButtonText;
        });
    }
</script>

</body>
</html>
