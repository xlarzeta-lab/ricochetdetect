<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monero Quantum Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
<style>
:root {
	/* Quantum Monero Palette */
	--xmr-base: #FF6600;
	--xmr-glow: rgba(255, 102, 0, 0.4);
	--xmr-dim: rgba(255, 102, 0, 0.1);
	
	--bg-void: #030303;
	--bg-glass: rgba(15, 15, 15, 0.65);
	--border-glass: rgba(255, 102, 0, 0.15);
	
	--text-main: #f0f0f0;
	--text-muted: #707070;
	--text-dark: #222222;
}

* {
	box-sizing: border-box;
	transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
	font-family: 'Inter', sans-serif;
	background-color: var(--bg-void);
	color: var(--text-main);
	margin: 0;
	min-height: 100vh;
	display: flex;
	justify-content: center;
	align-items: center;
	padding: 20px;
	/* Quantum Grid & Glow Background */
	background-image: 
	radial-gradient(circle at 50% 0%, rgba(255,102,0,0.08) 0%, transparent 50%),
	linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
	linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
	background-size: 100% 100%, 40px 40px, 40px 40px;
	background-position: top center, center center, center center;
}

/* --- Layout --- */
.dashboard {
	display: flex;
	flex-direction: column;
	gap: 20px;
	width: 100%;
	max-width: 900px;
}

@media (min-width: 768px) {
	.dashboard {
		flex-direction: row;
		align-items: stretch;
	}
}

.panel {
	background: var(--bg-glass);
	backdrop-filter: blur(20px);
	-webkit-backdrop-filter: blur(20px);
	border: 1px solid var(--border-glass);
	border-radius: 24px;
	padding: 30px;
	position: relative;
	overflow: hidden;
	box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.05);
}

/* --- Left Panel: Holographic Display --- */
.main-panel {
	flex: 1;
	display: flex;
	flex-direction: column;
	justify-content: space-between;
}

.main-panel::before {
	content: '';
	position: absolute;
	top: -50%; left: -50%; width: 200%; height: 200%;
	background: radial-gradient(circle, var(--xmr-dim) 0%, transparent 60%);
	z-index: -1;
	pointer-events: none;
}

header {
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-bottom: 20px;
}

.brand {
	display: flex;
	align-items: center;
	gap: 12px;
	font-family: 'JetBrains Mono', monospace;
	font-weight: 800;
	color: var(--xmr-base);
	text-transform: uppercase;
	letter-spacing: 1px;
	font-size: 0.9rem;
}

.logo-mark {
	width: 28px; height: 28px;
	background: var(--xmr-base);
	border-radius: 50%;
	display: flex; justify-content: center; align-items: center;
	color: var(--bg-void);
	font-size: 16px;
	box-shadow: 0 0 15px var(--xmr-glow);
}

.live-pulse {
	display: flex; align-items: center; gap: 6px;
	font-size: 0.75rem; color: var(--text-muted);
	text-transform: uppercase; letter-spacing: 2px;
}

.dot {
	width: 6px; height: 6px; border-radius: 50%;
	background: var(--xmr-base);
	box-shadow: 0 0 8px var(--xmr-base);
	animation: blink 2s infinite;
}

@keyframes blink { 0%, 100% {opacity: 1;} 50% {opacity: 0.3;} }

.price-container {
	margin: 30px 0;
}

.price-label {
	font-size: 0.8rem; color: var(--text-muted);
	text-transform: uppercase; letter-spacing: 2px;
	margin-bottom: 10px;
}

.price-value {
	font-family: 'JetBrains Mono', monospace;
	font-size: 4rem; font-weight: 800;
	line-height: 1; letter-spacing: -2px;
	text-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
}

/* Sparkline Chart */
.chart-container {
	width: 100%; height: 80px;
	margin: 20px 0;
	position: relative;
}

svg.sparkline {
	width: 100%; height: 100%;
	overflow: visible;
}

.spark-path {
	fill: none;
	stroke: var(--xmr-base);
	stroke-width: 3;
	stroke-linecap: round;
	stroke-linejoin: round;
	filter: drop-shadow(0 8px 12px var(--xmr-glow));
}

.verdict-box {
	margin-top: auto;
	padding: 20px;
	border-radius: 16px;
	font-family: 'JetBrains Mono', monospace;
	font-weight: 800; font-size: 1.2rem;
	text-align: center; text-transform: uppercase;
	letter-spacing: 2px;
	border: 1px solid transparent;
}

/* Holographic Signals */
.sig-buy { 
	background: rgba(255, 102, 0, 0.15);
	color: var(--xmr-base);
	border-color: var(--xmr-glow);
	box-shadow: inset 0 0 20px rgba(255, 102, 0, 0.1), 0 0 30px rgba(255, 102, 0, 0.2);
	text-shadow: 0 0 10px var(--xmr-glow);
}

.sig-neutral { 
	background: rgba(255, 255, 255, 0.03);
	color: #aaa;
	border-color: rgba(255,255,255,0.1);
}

.sig-sell { 
	background: rgba(0, 0, 0, 0.4);
	color: #444;
	border-color: #222;
}

/* --- Right Panel: Data Grid --- */
.side-panel {
	flex: 1;
	display: grid;
	grid-template-columns: 1fr 1fr;
	gap: 15px;
	align-content: start;
}

.metric-card {
	background: rgba(0, 0, 0, 0.3);
	border: 1px solid rgba(255, 255, 255, 0.03);
	border-radius: 16px;
	padding: 20px;
	display: flex; flex-direction: column; justify-content: space-between;
}

.metric-header {
	display: flex; justify-content: space-between; align-items: flex-start;
	margin-bottom: 15px;
}

.metric-title {
	font-size: 0.75rem; color: var(--text-muted);
	text-transform: uppercase; letter-spacing: 1px;
}

/* Dynamic Icons */
.icon {
	width: 18px; height: 18px;
	opacity: 0.3;
}
.icon-active {
	opacity: 1;
	color: var(--xmr-base);
	filter: drop-shadow(0 0 5px var(--xmr-glow));
}

.metric-val {
	font-family: 'JetBrains Mono', monospace;
	font-size: 1.5rem; font-weight: 700;
	margin-bottom: 5px;
}

.metric-status {
	font-size: 0.8rem; font-weight: 500;
}

.text-glow { color: var(--xmr-base); text-shadow: 0 0 8px var(--xmr-glow); }
.text-dim { color: var(--text-muted); }
.text-dark { color: #444; }

/* Loader */
.loader-overlay {
	position: absolute; top: 0; left: 0; width: 100%; height: 100%;
	background: var(--bg-void);
	display: flex; justify-content: center; align-items: center;
	z-index: 10;
	font-family: 'JetBrains Mono', monospace;
	color: var(--xmr-base); font-size: 0.9rem;
	letter-spacing: 1px; flex-direction: column; gap: 15px;
}

.spinner {
	width: 40px; height: 40px;
	border: 3px solid var(--text-dark);
	border-top-color: var(--xmr-base);
	border-radius: 50%;
	animation: spin 1s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

</style>
</head>
<body>

<div class="dashboard" id="app" style="display: none;">
<div class="panel main-panel">
<header>
<div class="brand">
<div class="logo-mark">M</div>
Quantum Node
</div>
<div class="live-pulse">
<div class="dot"></div> Live
</div>
</header>

<div class="price-container">
<div class="price-label">Monero Spot Price (USD)</div>
<div class="price-value" id="currentPrice">$--</div>
</div>

<div class="chart-container">
<svg class="sparkline" preserveAspectRatio="none">
<path id="sparklinePath" class="spark-path" d=""></path>
</svg>
</div>

<div class="verdict-box" id="mainVerdict">Analyzing...</div>
</div>

<div class="panel side-panel">
<div class="metric-card">
<div class="metric-header">
<span class="metric-title">14-Day RSI</span>
<svg class="icon" id="iconRsi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
</div>
<div>
<div class="metric-val" id="rsiValue">--</div>
<div class="metric-status" id="rsiSignal">--</div>
</div>
</div>

<div class="metric-card">
<div class="metric-header">
<span class="metric-title">MACD Hist</span>
<svg class="icon" id="iconMacd" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
</div>
<div>
<div class="metric-val" id="macdValue">--</div>
<div class="metric-status" id="macdSignal">--</div>
</div>
</div>

<div class="metric-card">
<div class="metric-header">
<span class="metric-title">EMA (20)</span>
<svg class="icon" id="iconEma20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/></svg>
</div>
<div>
<div class="metric-val" id="ema20Value">--</div>
<div class="metric-status" id="ema20Signal">--</div>
</div>
</div>

<div class="metric-card">
<div class="metric-header">
<span class="metric-title">EMA (50)</span>
<svg class="icon" id="iconEma50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M16 12l-4-4-4 4M12 8v8"/></svg>
</div>
<div>
<div class="metric-val" id="ema50Value">--</div>
<div class="metric-status" id="ema50Signal">--</div>
</div>
</div>
</div>
</div>

<div class="loader-overlay" id="loader">
<div class="spinner"></div>
<div id="loaderText">ESTABLISHING UPLINK...</div>
</div>

<script>
// --- MATH UTILITIES ---
function calculateEMA(prices, period) {
	const k = 2 / (period + 1);
	let emaArray = [prices[0]];
	for (let i = 1; i < prices.length; i++) {
		emaArray.push(prices[i] * k + emaArray[i - 1] * (1 - k));
	}
	return emaArray;
}

function calculateRSI(prices, period = 14) {
	if (prices.length < period + 1) return 50;
	let gains = 0, losses = 0;
	for (let i = 1; i <= period; i++) {
		const diff = prices[prices.length - 1 - period + i] - prices[prices.length - 1 - period + i - 1];
		if (diff >= 0) gains += diff; else losses -= diff;
	}
	let avgGain = gains / period, avgLoss = losses / period;
	const rs = avgGain / (avgLoss === 0 ? 1 : avgLoss);
	return 100 - (100 / (1 + rs));
}

function calculateMACD(prices) {
	if (prices.length < 26) return {histogram: 0};
	const ema12 = calculateEMA(prices, 12);
	const ema26 = calculateEMA(prices, 26);
	let macdLine = prices.map((_, i) => ema12[i] - ema26[i]);
	const signalLine = calculateEMA(macdLine, 9);
	return { histogram: macdLine[macdLine.length - 1] - signalLine[signalLine.length - 1] };
}

// --- SPARKLINE GENERATOR ---
function drawSparkline(prices) {
	const svgWidth = 400; // Virtual width for internal coordinate system
	const svgHeight = 80;
	const minPrice = Math.min(...prices);
	const maxPrice = Math.max(...prices);
	const range = maxPrice - minPrice || 1; // Prevent division by zero
	
	// Map prices to X,Y coordinates
	const points = prices.map((price, index) => {
		const x = (index / (prices.length - 1)) * svgWidth;
		// Invert Y axis because SVG 0,0 is top-left
		const y = svgHeight - ((price - minPrice) / range) * svgHeight;
		return `${x},${y}`;
	});
	
	// Update path string
	const pathString = `M ${points.join(' L ')}`;
	const pathEl = document.getElementById('sparklinePath');
	
	// Set viewBox dynamically to match virtual coordinate system
	pathEl.parentElement.setAttribute('viewBox', `0 -10 ${svgWidth} ${svgHeight + 20}`);
	pathEl.setAttribute('d', pathString);
}

// --- UI HELPER ---
function updateMetric(idPrefix, value, text, strength) {
	document.getElementById(`${idPrefix}Value`).innerText = value;
	const sigEl = document.getElementById(`${idPrefix}Signal`);
	const iconEl = document.getElementById(`icon${idPrefix.charAt(0).toUpperCase() + idPrefix.slice(1)}`);
	
	sigEl.innerText = text;
	
	// Reset classes
	sigEl.className = 'metric-status';
	if(iconEl) iconEl.className.baseVal = 'icon'; // SVG class manipulation
	
	// Apply theme based on logic strength (buy/strong = glowing orange)
	if (strength === 'strong') {
		sigEl.classList.add('text-glow');
		if(iconEl) iconEl.className.baseVal = 'icon icon-active';
	} else if (strength === 'weak') {
		sigEl.classList.add('text-dark');
	} else {
		sigEl.classList.add('text-dim');
	}
}

// --- MAIN APP ---
async function bootSequence() {
	try {
		document.getElementById('loaderText').innerText = "FETCHING COINGECKO DATA...";
		
		const response = await fetch('https://api.coingecko.com/api/v3/coins/monero/market_chart?vs_currency=usd&days=90&interval=daily');
		if (!response.ok) throw new Error('API Rate Limit');
		const data = await response.json();
		
		document.getElementById('loaderText').innerText = "CALCULATING QUANTUM VECTORS...";
		
		const prices = data.prices.map(p => p[1]);
		const currentPrice = prices[prices.length - 1];
		
		// Render Chart
		drawSparkline(prices);
		
		// Calculate Indicators
		const rsi = calculateRSI(prices);
		const macdData = calculateMACD(prices);
		const ema20Array = calculateEMA(prices, 20);
		const ema50Array = calculateEMA(prices, 50);
		const ema20 = ema20Array[ema20Array.length - 1];
		const ema50 = ema50Array[ema50Array.length - 1];
		
		let score = 0; 
		
		// RSI Logic
		let rsiSig = 'Neutral Zone'; let rsiStr = 'mid';
		if (rsi < 30) { score += 2; rsiSig = 'Deep Oversold'; rsiStr='strong'; }
		else if (rsi < 45) { score += 1; rsiSig = 'Accumulate'; rsiStr='strong';}
		else if (rsi > 70) { score -= 2; rsiSig = 'Overbought'; rsiStr='weak';}
		
		// MACD Logic
		let macdSig = 'Negative Momentum'; let macdStr = 'weak';
		if (macdData.histogram > 0) { score += 1; macdSig = 'Bullish Expansion'; macdStr='strong'; }
		
		// EMA 20
		let e20Sig = 'Under Short Trend'; let e20Str = 'weak';
		if (currentPrice > ema20) { score += 1; e20Sig = 'Above Short Trend'; e20Str='strong'; }
		
		// EMA 50
		let e50Sig = 'Under Macro Trend'; let e50Str = 'weak';
		if (currentPrice > ema50) { score += 1; e50Sig = 'Above Macro Trend'; e50Str='strong'; }
		
		// Bind UI
		document.getElementById('currentPrice').innerText = `$${currentPrice.toFixed(2)}`;
		
		updateMetric('rsi', rsi.toFixed(1), rsiSig, rsiStr);
		updateMetric('macd', macdData.histogram.toFixed(2), macdSig, macdStr);
		updateMetric('ema20', `$${ema20.toFixed(1)}`, e20Sig, e20Str);
		updateMetric('ema50', `$${ema50.toFixed(1)}`, e50Sig, e50Str);
		
		// Final Verdict Hologram
		const verdictEl = document.getElementById('mainVerdict');
		verdictEl.className = 'verdict-box'; 
		
		if (score >= 3) {
			verdictEl.innerText = "Execute Buy Order";
			verdictEl.classList.add('sig-buy');
		} else if (score > 0) {
			verdictEl.innerText = "Accumulate Protocol";
			verdictEl.classList.add('sig-neutral');
		} else {
			verdictEl.innerText = "Hold / Wait";
			verdictEl.classList.add('sig-sell');
		}
		
		// Smooth Reveal
		setTimeout(() => {
			document.getElementById('loader').style.display = 'none';
		document.getElementById('app').style.display = 'flex';
		}, 800); // Artificial delay to let the user see the cool boot sequence
		
	} catch (error) {
		console.error(error);
		document.getElementById('loaderText').innerText = "ERR: CONNECTION TIMEOUT. RETRYING...";
		document.getElementById('loaderText').style.color = "#ff3333";
	}
}

window.onload = bootSequence;
</script>
</body>
</html>
