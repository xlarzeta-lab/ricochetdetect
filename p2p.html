<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Terminal - P2P Matcher</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --monero-orange: #F26822;
            --bg-dark: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(242, 104, 34, 0.2);
            --text-main: #ffffff;
            --text-muted: #888888;
            --success-green: #00ff88;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }
        
        header {
            padding: 20px; text-align: center; border-bottom: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 10;
        }
        header h1 { color: var(--monero-orange); font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }
        header p { color: var(--text-muted); font-size: 0.85rem; margin-top: 5px; }

        #timer-bar { height: 3px; background: var(--monero-orange); width: 100%; transition: width 1s linear; }

        main { flex-grow: 1; padding: 20px; max-width: 800px; margin: 0 auto; width: 100%; }

        #order-book { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }

        .trade-card {
            background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 15px;
            padding: 20px; backdrop-filter: blur(12px); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }
        .trade-card:hover { transform: translateY(-5px); border-color: var(--monero-orange); }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .badge { background: rgba(242, 104, 34, 0.1); color: var(--monero-orange); padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        .price-row { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; }
        .details-row { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 15px; }

        .action-btn {
            width: 100%; background: transparent; color: var(--monero-orange); border: 1px solid var(--monero-orange);
            padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.3s ease;
        }
        .action-btn:hover { background: var(--monero-orange); color: var(--bg-dark); }
        .action-btn:disabled { border-color: var(--text-muted); color: var(--text-muted); background: transparent; cursor: not-allowed; }

        /* Multisig Terminal UI inside Card */
        .terminal-log {
            background: #000; font-family: monospace; font-size: 0.8rem; padding: 10px;
            border-radius: 5px; margin-top: 15px; color: var(--success-green);
            max-height: 150px; overflow-y: auto; display: none;
        }
        .qr-container { display: none; text-align: center; margin-top: 15px; background: #fff; padding: 10px; border-radius: 8px; }

        footer { text-align: center; padding: 20px; border-top: 1px solid var(--glass-border); font-size: 0.8rem; background: rgba(0, 0, 0, 0.8); }
        footer span { color: var(--monero-orange); word-break: break-all; }
    </style>
</head>
<body>

    <header>
        <h1>Local XMR Terminal</h1>
        <p>Zero-Database Order Book • Whitelist Protected</p>
    </header>
    <div id="timer-bar"></div>

    <main>
        <div id="order-book"></div>
    </main>

    <footer>
        <p>Support this local network. XMR Donation / Arbitrator Fee Address:</p>
        <br>
        <span id="donation-address">888tNkZrPN6JsEgekjMnABU4TBzc2Dt29EPAvkRxbANsAnjyPbb3iQ1YBRk1UXcdRsiKc9CEv12V8U7nUjE5B5G1Fv7aEwq</span>
    </footer>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        const WHITELISTED_SELLERS = ['npub1trusted_seller_alpha_example99'];
        const REFRESH_RATE_MS = 60000;
        const ARBITRATOR_ADDRESS = document.getElementById('donation-address').innerText;
        const SYSTEM_FEE_PERCENTAGE = 0.01; // 1%

        const orderBookDiv = document.getElementById('order-book');
        const timerBar = document.getElementById('timer-bar');

        // ==========================================
        // MARKET DATA FETCHER
        // ==========================================
        async function fetchMarketData() {
            return new Promise(resolve => {
                setTimeout(() => {
                    resolve([{
                        pubkey: 'npub1trusted_seller_alpha_example99',
                        type: 'SELL',
                        asset: 'XMR',
                        fiatPrice: '$142.50',
                        amount: '5.0',
                        location: 'New Rochelle - Downtown (In-Person)',
                        timestamp: Date.now()
                    }]);
                }, 500); 
            });
        }

        function renderOrders(orders) {
            // Only re-render if no trades are actively running to avoid UI wiping
            if (document.querySelector('.active-trade')) return;

            orderBookDiv.innerHTML = ''; 
            const filteredOrders = orders.filter(order => WHITELISTED_SELLERS.includes(order.pubkey));

            if (filteredOrders.length === 0) {
                orderBookDiv.innerHTML = '<p style="text-align:center; color: #888;">No verified local orders available.</p>';
                return;
            }

            filteredOrders.forEach(order => {
                const card = document.createElement('div');
                card.className = 'trade-card';
                card.id = `card-${order.pubkey}`;
                
                card.innerHTML = `
                    <div class="card-header">
                        <span class="badge">${order.type} ${order.asset}</span>
                        <span style="font-size: 0.8rem; color: #888;">Verified Seller</span>
                    </div>
                    <div class="price-row">${order.amount} ${order.asset} @ ${order.fiatPrice}</div>
                    <div class="details-row">📍 ${order.location}</div>
                    <button id="btn-${order.pubkey}" class="action-btn" onclick="startTradeFlow('${order.pubkey}', ${order.amount}, '${card.id}')">
                        Initiate Trade
                    </button>
                    <div id="terminal-${order.pubkey}" class="terminal-log"></div>
                    <div id="qr-${order.pubkey}" class="qr-container"></div>
                `;
                orderBookDiv.appendChild(card);
            });
        }

        // ==========================================
        // MULTISIG CRYPTOGRAPHIC PROTOCOL (Simulated WASM Bridge)
        // ==========================================
        
        async function startTradeFlow(sellerNpub, amount, cardId) {
            const card = document.getElementById(cardId);
            const btn = document.getElementById(`btn-${sellerNpub}`);
            const terminal = document.getElementById(`terminal-${sellerNpub}`);
            const qrContainer = document.getElementById(`qr-${sellerNpub}`);
            
            card.classList.add('active-trade');
            btn.disabled = true;
            terminal.style.display = 'block';

            const log = (msg) => { 
                terminal.innerHTML += `> ${msg}<br>`; 
                terminal.scrollTop = terminal.scrollHeight; 
            };

            // STATE 1: Key Exchange via Nostr
            log("INITIATING TRUSTLESS HANDSHAKE...");
            await new Promise(r => setTimeout(r, 1200));
            log(`Pinging Nostr Relay for ${sellerNpub} public keys...`);
            await new Promise(r => setTimeout(r, 1000));
            log("Seller public keys acquired. Generating local keyset...");
            await new Promise(r => setTimeout(r, 1500));

            // STATE 2: Computing 2-of-3 Multisig locally (WASM function)
            log("COMPUTING 2-OF-3 MULTISIG ADDRESS...");
            log("Participant 1: Local Buyer");
            log("Participant 2: Nostr Seller");
            log(`Arbitrator: ${ARBITRATOR_ADDRESS.substring(0, 15)}...`);
            
            await new Promise(r => setTimeout(r, 2000));
            const generatedMultisigAddress = "44AFFq5kSiGBoZ... (Simulated 2/3 Address)";
            log(`SUCCESS. Escrow address generated.`);
            
            qrContainer.style.display = 'block';
            new QRCode(qrContainer, { text: generatedMultisigAddress, width: 128, height: 128 });
            
            btn.innerText = "Awaiting Seller Deposit...";

            // STATE 3: Blockchain Scanning
            log("Connecting to remote node: node.xmr.to:18081...");
            log("Scanning mempool for escrow deposit...");
            
            // Simulating waiting for real-world blockchain block
            await new Promise(r => setTimeout(r, 4000));
            log(`DEPOSIT DETECTED: ${amount} XMR in Escrow.`);
            qrContainer.style.display = 'none';

            // STATE 4: Settlement and Fee Enforcement
            btn.disabled = false;
            btn.innerText = "Sign Release Transaction";
            btn.style.borderColor = "var(--success-green)";
            btn.style.color = "var(--success-green)";
            
            btn.onclick = () => buildFinalTransaction(amount, log, btn, card);
        }

        async function buildFinalTransaction(totalAmount, log, btn, card) {
            btn.disabled = true;
            btn.innerText = "Computing Cryptography...";
            
            const fee = (totalAmount * SYSTEM_FEE_PERCENTAGE).toFixed(4);
            const payout = (totalAmount - fee).toFixed(4);

            log("CONSTRUCTING RELEASE TRANSACTION...");
            await new Promise(r => setTimeout(r, 1000));
            log(`Output 1 (Buyer): ${payout} XMR`);
            log(`Output 2 (System Fee): ${fee} XMR -> Arbitrator Address`);
            
            // This is where the WASM library strictly refuses to generate 
            // a valid signature unless Output 2 matches your Hardcoded rule.
            log("Enforcing fee policy... Policy matched.");
            await new Promise(r => setTimeout(r, 1500));
            
            log("Signing transaction (1/2 signatures acquired)...");
            log("Broadcasting partial tx to Seller via Nostr...");
            
            await new Promise(r => setTimeout(r, 2000));
            log("Seller signature (2/2) received! Broadcasting to network...");
            
            btn.innerText = "Trade Complete";
            btn.style.background = "var(--success-green)";
            btn.style.color = "#000";
            
            setTimeout(() => { card.classList.remove('active-trade'); }, 5000);
        }

        // ==========================================
        // TIMER LOOP
        // ==========================================
        let secondsPassed = 0;
        function updateTimerBar() {
            secondsPassed++;
            const percentage = (secondsPassed / (REFRESH_RATE_MS / 1000)) * 100;
            timerBar.style.width = percentage + '%';

            if (secondsPassed >= (REFRESH_RATE_MS / 1000)) {
                secondsPassed = 0;
                timerBar.style.transition = 'none'; 
                timerBar.style.width = '0%';
                setTimeout(() => { timerBar.style.transition = 'width 1s linear'; }, 50);
                
                // Only sync if a trade isn't actively happening
                if (!document.querySelector('.active-trade')) syncNetwork();
            }
        }

        async function syncNetwork() {
            const rawOrders = await fetchMarketData();
            renderOrders(rawOrders);
        }

        function init() {
            syncNetwork();
            setInterval(updateTimerBar, 1000);
        }

        window.onload = init;
    </script>
</body>
</html>
