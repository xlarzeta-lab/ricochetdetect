<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local XMR Matchmaker</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --monero-orange: #F26822;
            --bg-dark: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(242, 104, 34, 0.2);
            --text-main: #ffffff;
            --text-muted: #888888;
            --success-green: #00ff88;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }
        
        header {
            padding: 20px; text-align: center; border-bottom: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 10;
        }
        header h1 { color: var(--monero-orange); font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }
        header p { color: var(--text-muted); font-size: 0.85rem; margin-top: 5px; }

        #timer-bar { height: 3px; background: var(--monero-orange); width: 100%; transition: width 1s linear; }

        main { flex-grow: 1; padding: 20px; max-width: 800px; margin: 0 auto; width: 100%; }

        #order-book { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }

        .trade-card {
            background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 15px;
            padding: 20px; backdrop-filter: blur(12px); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }
        .trade-card:hover { transform: translateY(-5px); border-color: var(--monero-orange); }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .badge { background: rgba(242, 104, 34, 0.1); color: var(--monero-orange); padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        .price-row { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; }
        .details-row { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 15px; }

        .action-btn {
            width: 100%; background: transparent; color: var(--monero-orange); border: 1px solid var(--monero-orange);
            padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.3s ease;
        }
        .action-btn:hover { background: var(--monero-orange); color: var(--bg-dark); }
        .action-btn:disabled { border-color: var(--text-muted); color: var(--text-muted); background: transparent; cursor: not-allowed; }

        /* Manual Reveal UI */
        .reveal-box {
            display: none; margin-top: 15px; padding: 15px; border-radius: 8px;
            background: rgba(0, 255, 136, 0.05); border: 1px solid rgba(0, 255, 136, 0.2);
            text-align: center; animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .contact-info { margin-top: 10px; font-family: monospace; font-size: 0.9rem; color: var(--success-green); word-break: break-all; }
        .qr-container { display: flex; justify-content: center; margin-top: 10px; background: #fff; padding: 10px; border-radius: 8px; width: max-content; margin-inline: auto; }

        footer { text-align: center; padding: 20px; border-top: 1px solid var(--glass-border); font-size: 0.8rem; background: rgba(0, 0, 0, 0.8); }
        footer span { color: var(--monero-orange); word-break: break-all; }
        
        #network-status { position: absolute; top: 20px; right: 20px; font-size: 0.8rem; color: #ff3333; }
        .online { color: var(--success-green) !important; }
    </style>
</head>
<body>

    <header>
        <h1>Local XMR Matchmaker</h1>
        <p>Decentralized Board • Verified Sellers Only</p>
        <div id="network-status">Nostr: Offline</div>
    </header>
    <div id="timer-bar"></div>

    <main>
        <div id="order-book">
            <p style="text-align:center; color: #888;">Connecting to decentralized relays...</p>
        </div>
    </main>

    <footer>
        <p>Want to list your offers here? Pay the listing fee to:</p>
        <br>
        <span id="donation-address">888tNkZrPN6JsEgekjMnABU4TBzc2Dt29EPAvkRxbANsAnjyPbb3iQ1YBRk1UXcdRsiKc9CEv12V8U7nUjE5B5G1Fv7aEwq</span>
    </footer>

    <script>
        // ==========================================
        // SYSTEM CONFIGURATION
        // ==========================================
        
        // You control who can sell. Charge them a fee to add their key here.
        const WHITELISTED_SELLERS = ['npub1trusted_seller_alpha_example99']; 
        
        const REFRESH_RATE_MS = 60000;
        const NOSTR_RELAY = 'wss://relay.damus.io'; 
        const MARKET_TAG = 'xmr-local-nr-zone';

        const orderBookDiv = document.getElementById('order-book');
        const timerBar = document.getElementById('timer-bar');
        const networkStatus = document.getElementById('network-status');
        
        let liveOrders = new Map(); 

        // ==========================================
        // 1. LIVE NOSTR WEBSOCKET
        // ==========================================
        function connectNostr() {
            const nostrSocket = new WebSocket(NOSTR_RELAY);

            nostrSocket.onopen = () => {
                networkStatus.innerText = "Nostr: Online";
                networkStatus.classList.add('online');
                nostrSocket.send(JSON.stringify(["REQ", "market_sub", { "kinds": [1], "#t": [MARKET_TAG], "limit": 50 }]));
            };

            nostrSocket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data[0] === "EVENT") processNostrEvent(data[2]);
            };

            nostrSocket.onerror = () => {
                networkStatus.innerText = "Nostr: Error";
                networkStatus.classList.remove('online');
            };
        }

        function processNostrEvent(event) {
            if (!WHITELISTED_SELLERS.includes(event.pubkey)) return;
            try {
                const orderData = JSON.parse(event.content);
                // Require asset, amount, and contact info for a manual trade
                if (orderData.asset === 'XMR' && orderData.amount) {
                    orderData.id = event.id;
                    orderData.pubkey = event.pubkey;
                    orderData.timestamp = event.created_at * 1000;
                    liveOrders.set(event.id, orderData);
                    renderOrders();
                }
            } catch (e) {}
        }

        // ==========================================
        // 2. UI RENDERING
        // ==========================================
        function renderOrders() {
            if (liveOrders.size === 0) {
                // Dummy order so you can see the UI immediately
                liveOrders.set('dummy1', {
                    pubkey: 'npub1trusted_seller_alpha_example99', 
                    type: 'SELL', 
                    asset: 'XMR',
                    fiatPrice: '$142.50', 
                    amount: '5.0', 
                    location: 'New Rochelle - Downtown', 
                    contact: 'Session ID: 054b8a...9c21',
                    directAddress: '44AFFq5kSiGBoZ4NMDwYtN18obc8AemS33DBLWs3H7otXft3XjrpDtQGv7SqSsaBYBb98uNbr2VBBEt7f2wfn3RVGQBEP3A',
                    timestamp: Date.now()
                });
            }

            orderBookDiv.innerHTML = ''; 
            liveOrders.forEach((order) => {
                const card = document.createElement('div');
                card.className = 'trade-card';
                card.innerHTML = `
                    <div class="card-header">
                        <span class="badge">${order.type || 'SELL'} ${order.asset}</span>
                        <span style="font-size: 0.8rem; color: #888;">Verified Seller</span>
                    </div>
                    <div class="price-row">${order.amount} ${order.asset} @ ${order.fiatPrice}</div>
                    <div class="details-row">📍 ${order.location || 'Local Sector'}</div>
                    
                    <button class="action-btn" onclick="revealContact(this, '${order.contact}', '${order.directAddress}')">
                        Match & Reveal Info
                    </button>
                    
                    <div class="reveal-box">
                        <p style="color: var(--text-main); font-size: 0.85rem;">Secure Contact:</p>
                        <div class="contact-info">${order.contact || 'No contact provided'}</div>
                        <div class="qr-container"></div>
                        <p style="font-size: 0.75rem; margin-top: 10px; color: var(--text-muted);">Coordinate meeting and execute manual transfer.</p>
                    </div>
                `;
                orderBookDiv.appendChild(card);
            });
        }

        // ==========================================
        // 3. MANUAL TRADE REVEAL
        // ==========================================
        function revealContact(button, contactInfo, xmrAddress) {
            const card = button.closest('.trade-card');
            const revealBox = card.querySelector('.reveal-box');
            const qrContainer = card.querySelector('.qr-container');
            
            button.style.display = 'none'; // Hide the button
            revealBox.style.display = 'block'; // Show the secret info
            
            if (xmrAddress && xmrAddress !== 'undefined') {
                new QRCode(qrContainer, { 
                    text: xmrAddress, 
                    width: 128, 
                    height: 128,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                });
            } else {
                qrContainer.innerHTML = '<span style="color: black; font-size: 0.8rem;">Ask seller for address via secure contact.</span>';
            }
        }

        // ==========================================
        // TIMER & SYNC LOOP
        // ==========================================
        let secondsPassed = 0;
        function updateTimerBar() {
            secondsPassed++;
            timerBar.style.width = (secondsPassed / (REFRESH_RATE_MS / 1000)) * 100 + '%';
            if (secondsPassed >= (REFRESH_RATE_MS / 1000)) {
                secondsPassed = 0;
                timerBar.style.transition = 'none'; 
                timerBar.style.width = '0%';
                setTimeout(() => { timerBar.style.transition = 'width 1s linear'; }, 50);
                
                // Only re-render if a user hasn't clicked "reveal" on a card
                if (!document.querySelector('.reveal-box[style*="display: block"]')) {
                    renderOrders();
                }
            }
        }

        function init() {
            connectNostr();
            renderOrders(); 
            setInterval(updateTimerBar, 1000);
        }

        window.onload = init;
    </script>
</body>
</html>
